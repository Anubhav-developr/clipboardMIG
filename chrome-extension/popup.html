<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ClipboardMig</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ClipboardMig</h1>
          <p id="history-count">0 saved items</p>
        </div>
        <span id="status-dot" aria-hidden="true"></span>
      </header>

      <section class="connection-panel">
        <label for="transport-mode">Sync Mode</label>
        <select id="transport-mode">
          <option value="firebase">Cloud Sync</option>
          <option value="websocket">Local Network</option>
        </select>

        <div id="firebase-fields">
          <label for="firebase-db-url">Cloud Relay URL</label>
          <input id="firebase-db-url" type="text" spellcheck="false" placeholder="https://your-project-default-rtdb.firebaseio.com">

          <label for="firebase-room">Sync Code</label>
          <input id="firebase-room" type="text" spellcheck="false" placeholder="demo">
          <p class="helper-text">Usually you only change the Sync Code. The Cloud Relay URL can stay as it is.</p>
        </div>

        <div id="websocket-fields">
          <label for="ws-url">Local Server URL</label>
          <input id="ws-url" type="text" spellcheck="false" placeholder="ws://192.168.1.20:8080?room=demo&token=changeme">
        </div>

        <div class="actions">
          <button id="save">Save & Connect</button>
          <button id="reconnect" type="button">Reconnect</button>
        </div>
      </section>

      <section class="status-panel">
        <p class="label">Status</p>
        <p id="status">Loading...</p>
      </section>

      <section class="last-panel">
        <p class="label">Last copied</p>
        <p id="last-text">Nothing yet</p>
        <p id="last-time"></p>
      </section>

      <section class="history-section">
        <div class="history-head">
          <p class="label">Clipboard History</p>
          <div class="history-actions">
            <button id="copy-all" class="link-button" type="button">Copy All</button>
            <button id="clear-history" class="link-button" type="button">Clear</button>
          </div>
        </div>
        <div id="history" class="history-list"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
